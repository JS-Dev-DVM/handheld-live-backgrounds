<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wavescape — Preview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; color: #e6e6e6;
    font: 13px/1.4 -apple-system, Segoe UI, Roboto, sans-serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  #panel {
    position: fixed; top: 12px; right: 12px; width: 280px; max-height: calc(100vh - 24px);
    overflow: auto; background: rgba(10,12,16,0.82); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 14px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 10;
  }
  #panel h1 { font-size: 14px; margin: 0 0 2px; letter-spacing: .5px; }
  #panel .sub { font-size: 11px; opacity: .55; margin: 0 0 12px; }
  .row { margin: 10px 0; }
  .row label { display: flex; justify-content: space-between; font-size: 12px; opacity: .85; margin-bottom: 4px; }
  .row label b { font-weight: 600; opacity: .95; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; accent-color: #cfd8e3; }
  input[type=color] { width: 100%; height: 30px; border: none; background: none; cursor: pointer; }
  .btns { display: flex; gap: 8px; margin-top: 14px; }
  button { flex: 1; padding: 8px 10px; font-size: 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color: #e6e6e6; }
  button:hover { background: rgba(255,255,255,0.12); }
  #presets { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 10px; }
  #presets button { flex: 1 1 auto; padding: 6px 8px; }
  #hint { position: fixed; bottom: 10px; left: 12px; font-size: 11px; opacity: .4; z-index: 10; }
  #fps { position: fixed; bottom: 10px; right: 12px; font-size: 11px; opacity: .45;
    font-variant-numeric: tabular-nums; z-index: 10; }
  #toggle { position: fixed; top: 12px; right: 12px; z-index: 11; display: none;
    width: 36px; height: 36px; border-radius: 9px; }
  @media (max-width: 640px) { #panel { width: calc(100vw - 24px); } }
</style>
<style id="card-clean">
html,body{margin:0!important;padding:0!important;width:100%!important;height:100%!important;overflow:hidden!important;background:#000!important;pointer-events:none!important;cursor:default!important}
#panel,.panel,#ui,.menubar,.controls,.toolbar,.legend,.hud,.menu,details,form,h1,h2,.title{display:none!important}
input,label,button,select,textarea{display:none!important}
.wrap{display:block!important;position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;margin:0!important;padding:0!important;gap:0!important;grid-template-columns:none!important;grid-template-rows:none!important}
#stage,.stage{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;margin:0!important;padding:0!important;border:0!important;border-radius:0!important;box-shadow:none!important;max-width:none!important;max-height:none!important}
#cv,canvas{width:100%!important;height:100%!important;border-radius:0!important;display:block!important}
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<div id="panel">
  <h1>Wavescape</h1>
  <p class="sub">fBm-noise engine (mkvdb-style). Tune, then Copy settings.</p>
  <div id="presets"></div>
  <div class="row"><label>Flow speed <b id="v-speed"></b></label>
    <input id="speed" type="range" min="0" max="3" step="0.05"></div>
  <div class="row"><label>Strands <b id="v-lines"></b></label>
    <input id="lines" type="range" min="8" max="70" step="1"></div>
  <div class="row"><label>Amplitude (wave height) <b id="v-amp"></b></label>
    <input id="amp" type="range" min="0" max="260" step="2"></div>
  <div class="row"><label>Thickness (fan depth) <b id="v-thick"></b></label>
    <input id="thick" type="range" min="10" max="220" step="2"></div>
  <div class="row"><label>Vertical position <b id="v-posy"></b></label>
    <input id="posy" type="range" min="0" max="1" step="0.01"></div>
  <div class="row"><label>Line width <b id="v-width"></b></label>
    <input id="width" type="range" min="0.4" max="3" step="0.1"></div>
  <div class="row"><label>Front brightness <b id="v-glow"></b></label>
    <input id="glow" type="range" min="0.2" max="1" step="0.01"></div>
  <div class="row"><label>Complexity (octaves) <b id="v-cx"></b></label>
    <input id="cx" type="range" min="1" max="8" step="1"></div>
  <div class="row"><label>FPS cap <b id="v-fps"></b></label>
    <input id="fps" type="range" min="20" max="60" step="1"></div>
  <div class="row"><label>Color</label>
    <input id="color" type="color"></div>
  <div class="btns">
    <button id="copy">Copy settings</button>
    <button id="hidepanel">Hide</button>
  </div>
</div>
<button id="toggle">⚙</button>
<div id="hint">fBm heightfield · mirrors the plugin engine 1:1</div>
<div id="fps">–</div>

<script>
// Wavescape engine — SAME math as the Decky plugin (TS port). fBm-noise
// heightfield, depth-stacked, front-bright -> back-dim, layered painter's order.
const NX = 2.4, NZ = 0.16, SCROLL = 0.16, BACK_FLOOR = 0.13, FALLOFF = 1.8;
function hash2(x, y){ const s = Math.sin(x*127.1 + y*311.7)*43758.5453; return s - Math.floor(s); }
function vnoise(x, y){
  const xi=Math.floor(x), yi=Math.floor(y), xf=x-xi, yf=y-yi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
  const a=hash2(xi,yi), b=hash2(xi+1,yi), c=hash2(xi,yi+1), d=hash2(xi+1,yi+1);
  const top=a+(b-a)*u, bot=c+(d-c)*u;
  return (top+(bot-top)*v)*2-1;
}
function fbm(x, y, oct){
  let sum=0, amp=0.5, fx=x, fy=y;
  for(let o=0;o<oct;o++){ sum+=amp*vnoise(fx,fy); fx=fx*2.02+0.13; fy=fy*2.02-0.07; amp*=0.5; }
  return sum;
}
function makeWavescape(canvas, cfg, win) {
  win = win || window;
  const ctx = canvas.getContext("2d", { alpha: false });
  let W = 0, H = 0, dpr = 1, step = 6;
  let raf = 0, last = 0, running = false;
  function hexRgb(h){ h=(h||"#ffffff").replace("#",""); if(h.length===3) h=h.split("").map(c=>c+c).join(""); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function resize() {
    const r = canvas.getBoundingClientRect();
    W = Math.max(1, r.width || canvas.clientWidth || 1280);
    H = Math.max(1, r.height || canvas.clientHeight || 800);
    dpr = Math.min(win.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(W*dpr); canvas.height = Math.floor(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    step = Math.max(5, Math.floor(W/220));
  }
  function frame(now) {
    if (!running) return;
    raf = win.requestAnimationFrame(frame);
    const interval = 1000 / (cfg.fps || 60);
    if (now - last < interval) return;
    last = now;
    const [cr,cg,cb] = hexRgb(cfg.color);
    const sp = cfg.speed, T = (now/1000)*sp;
    const oct = Math.max(1, Math.min(8, cfg.complexity|0));
    const n = Math.max(2, cfg.lines|0);
    const amp = cfg.amp, thick = cfg.thickness, intensity = cfg.glow;
    const baseY = H*(cfg.posY!=null?cfg.posY:0.40), scroll = T*SCROLL;
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,W,H);
    ctx.lineWidth = cfg.width; ctx.lineJoin = "round";
    for (let i = n-1; i >= 0; i--) {
      const frac = i/(n-1);
      const bright = BACK_FLOOR + (1-BACK_FLOOR)*Math.pow(1-frac, FALLOFF);
      const a = Math.min(1, bright*intensity);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a.toFixed(3)})`;
      const fan = 0.30 + 0.70*(0.5 + 0.5*Math.sin(frac*6.28*0.5 - T*0.4));
      ctx.beginPath();
      for (let x = 0; x <= W+step; x += step) {
        const u = x/W;
        const h = fbm(u*NX, frac*NZ + scroll, oct);
        const y = baseY + frac*thick*fan + amp*h;
        x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }
  return {
    setConfig(p){ Object.assign(cfg,p); }, resize,
    start(){ if(running) return; running=true; last=0; resize(); raf=win.requestAnimationFrame(frame); },
    stop(){ running=false; if(raf) win.cancelAnimationFrame(raf); raf=0; }, _cfg: cfg,
  };
}

const PRESETS = {
  "Default": { posY: 0.40, speed: 0.25, lines: 9, amp: 202, thickness: 104, width: 1.9, glow: 1.0, complexity: 4, fps: 40, color: "#b8ffe8" },
  "Creator (mkvdb)": { posY: 0.40, speed: 0.55, lines: 16, amp: 150, thickness: 100, width: 1.0, glow: 1.0, complexity: 4, fps: 40, color: "#ffffff" },
};
let cfg = { ...PRESETS["Default"] };
const cv = document.getElementById("cv");
const engine = makeWavescape(cv, cfg, window);
const ids = ["speed","lines","amp","thick","posy","width","glow","cx","fps","color"];
const map = { cx: "complexity", thick: "thickness", posy: "posY" };
function key(id){ return map[id] || id; }
function syncLabels(){
  document.getElementById("v-speed").textContent = (+cfg.speed).toFixed(2);
  document.getElementById("v-lines").textContent = cfg.lines;
  document.getElementById("v-amp").textContent = cfg.amp;
  document.getElementById("v-thick").textContent = cfg.thickness;
  document.getElementById("v-posy").textContent = (+cfg.posY).toFixed(2);
  document.getElementById("v-width").textContent = (+cfg.width).toFixed(1);
  document.getElementById("v-glow").textContent = (+cfg.glow).toFixed(2);
  document.getElementById("v-cx").textContent = cfg.complexity;
  document.getElementById("v-fps").textContent = cfg.fps;
}
function pushToInputs(){
  document.getElementById("speed").value = cfg.speed;
  document.getElementById("lines").value = cfg.lines;
  document.getElementById("amp").value = cfg.amp;
  document.getElementById("thick").value = cfg.thickness;
  document.getElementById("posy").value = cfg.posY;
  document.getElementById("width").value = cfg.width;
  document.getElementById("glow").value = cfg.glow;
  document.getElementById("cx").value = cfg.complexity;
  document.getElementById("fps").value = cfg.fps;
  document.getElementById("color").value = cfg.color;
  syncLabels();
}
ids.forEach(id => {
  document.getElementById(id).addEventListener("input", e => {
    const k = key(id); cfg[k] = id === "color" ? e.target.value : +e.target.value;
    engine.setConfig(cfg); syncLabels();
  });
});
const pwrap = document.getElementById("presets");
Object.keys(PRESETS).forEach(name => {
  const b = document.createElement("button"); b.textContent = name;
  b.onclick = () => { cfg = { ...PRESETS[name] }; engine.setConfig(cfg); pushToInputs(); };
  pwrap.appendChild(b);
});
document.getElementById("copy").addEventListener("click", async () => {
  const out = JSON.stringify(cfg, null, 2);
  try { await navigator.clipboard.writeText(out); } catch {}
  const btn = document.getElementById("copy"); const old = btn.textContent;
  btn.textContent = "Copied ✓"; setTimeout(() => btn.textContent = old, 1200);
});
const panel = document.getElementById("panel"), toggle = document.getElementById("toggle");
document.getElementById("hidepanel").onclick = () => { panel.style.display="none"; toggle.style.display="block"; };
toggle.onclick = () => { panel.style.display="block"; toggle.style.display="none"; };
let fc = 0, ft = performance.now();
(function meter(){ fc++; const now = performance.now();
  if (now-ft >= 500){ document.getElementById("fps").textContent = Math.round(fc*1000/(now-ft))+" fps"; fc=0; ft=now; }
  requestAnimationFrame(meter);
})();
window.addEventListener("resize", () => engine.resize());
pushToInputs(); engine.start();
</script>
<script id="card-resize-kick">
(function(){function k(){try{window.dispatchEvent(new Event('resize'));}catch(e){}}
window.addEventListener('load',function(){k();setTimeout(k,60);setTimeout(k,300);setTimeout(k,1000);});
if(document.readyState!=='loading'){k();setTimeout(k,300);}})();
</script>
</body>
</html>
