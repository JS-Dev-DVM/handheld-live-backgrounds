<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UFO — B/W + CRT (pixelated, ROG Ally X)</title>
<style>
 :root{--bg:#0b0d12;--panel:#141821;--panel2:#1b212d;--ink:#e8edf5;--mut:#8b97a8;--line:#252c3a}
 *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif}
 .wrap{display:flex;height:100%}
 .stage{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px;background:#06070a}
 .device{position:relative;background:#000;border:10px solid #1a1d24;border-radius:16px;box-shadow:0 12px 44px rgba(0,0,0,.55);overflow:hidden}
 #cv{display:block;width:100%;height:100%;image-rendering:pixelated}
 .devlabel{font:600 12px system-ui;color:var(--mut);letter-spacing:.05em}
 .badge{position:absolute;left:12px;top:10px;font:600 11px system-ui;background:rgba(20,24,33,.72);border:1px solid var(--line);color:#fff;padding:4px 9px;border-radius:999px}
 .panel{width:332px;flex:none;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:16px 16px 28px}
 h1{font-size:15px;margin:0 0 2px} .sub{color:var(--mut);font-size:12px;margin:0 0 10px}
 .sec{font:700 11px system-ui;color:#cfe7ff;letter-spacing:.06em;margin:12px 0 8px;text-transform:uppercase}
 .row{margin:0 0 10px} .row label{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:4px} .row label b{color:var(--ink);font-weight:600}
 input[type=range]{width:100%;accent-color:#cfd6dd;height:18px}
 .seg{display:flex;gap:6px} .seg button{flex:1;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px;font-size:12px;cursor:pointer} .seg button.on{border-color:#cfd6dd;color:#fff}
 .divider{height:1px;background:var(--line);margin:12px 0}
 .btns{display:flex;gap:8px} .btns button{flex:1;background:#e6edf3;color:#0a0d13;border:0;border-radius:8px;padding:9px;font-weight:700;cursor:pointer}
 textarea{width:100%;height:58px;margin-top:10px;background:#0a0d13;color:#dfe7ee;border:1px solid var(--line);border-radius:8px;font:11px ui-monospace,monospace;padding:8px}
 .hint{font-size:11px;color:var(--mut);margin-top:8px}
</style><style id="card-clean">
html,body{margin:0!important;padding:0!important;width:100%!important;height:100%!important;overflow:hidden!important;background:#000!important;pointer-events:none!important;cursor:default!important}
#panel,.panel,#ui,.menubar,.controls,.toolbar,.legend,.hud,.menu,details,form,h1,h2,.title{display:none!important}
input,label,button,select,textarea{display:none!important}
.wrap{display:block!important;position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;margin:0!important;padding:0!important;gap:0!important;grid-template-columns:none!important;grid-template-rows:none!important}
#stage,.stage{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;margin:0!important;padding:0!important;border:0!important;border-radius:0!important;box-shadow:none!important;max-width:none!important;max-height:none!important}
#cv,canvas{width:100%!important;height:100%!important;border-radius:0!important;display:block!important}
</style>
</head><body><div class="wrap">
 <div class="stage">
   <div class="device" id="device"><canvas id="cv"></canvas><div class="badge">▸ UFO · B/W · CRT</div></div>
   <div class="devlabel">ROG Ally X screen · 1920 × 1080 · 16:9</div>
 </div>
 <div class="panel">
   <h1>UFO vs Invaders</h1>
   <p class="sub">Monochrome. Lock-on fire, EXP, leveling. Inked saucer, CRT scanlines, dust on kills.</p>
   <div class="sec">UFO</div>
   <div class="row"><label>How many UFOs <b id="vCount"></b></label><input type="range" id="count" min="1" max="4" step="1"></div>
   <div class="row"><label>UFO size <b id="vSize"></b></label><input type="range" id="size" min="1.5" max="9" step="0.5"></div>
   <div class="row"><label>Inked / contrast <b id="vInk"></b></label><input type="range" id="ink" min="0" max="100" step="5"></div>
   <div class="row"><label>Base speed <b id="vSpeed"></b></label><input type="range" id="speed" min="8" max="90" step="2"></div>
   <div class="row"><label>Calm ↔ hyper <b id="vCalm"></b></label><input type="range" id="calm" min="0" max="100" step="5"></div>
   <div class="row"><label>Glow <b id="vGlow"></b></label><input type="range" id="glow" min="0" max="100" step="5"></div>
   <div class="row"><label>Link UFOs <b id="vLink"></b></label><input type="range" id="link" min="0" max="100" step="5"></div>
   <div class="sec">Behaviour</div>
   <div class="row"><label>Invaders <b id="vInv"></b></label><input type="range" id="invaders" min="0" max="100" step="5"></div>
   <div class="row"><label>Invader size <b id="vIsz"></b></label><input type="range" id="invSize" min="50" max="260" step="10"></div>
   <div class="row"><label>Ash trails <b id="vAsh"></b></label><input type="range" id="ash" min="0" max="100" step="5"></div>
   <div class="row"><label>Lock-on time <b id="vLock"></b></label><input type="range" id="lock" min="0" max="100" step="5"></div>
   <div class="row"><label>Patrol loops <b id="vPat"></b></label><input type="range" id="patrol" min="0" max="100" step="5"></div>
   <div class="row"><label>Teleport <b id="vTele"></b></label><input type="range" id="teleport" min="0" max="100" step="5"></div>
   <div class="row"><label>Avoid artwork <b id="vBand"></b></label><input type="range" id="band" min="0" max="100" step="5"></div>
   <div class="row"><label>Idle fire <b id="vFire"></b></label><input type="range" id="fire" min="0" max="100" step="5"></div>
   <div class="sec">Background / FX</div>
   <div class="row"><label>Grid <b id="vGrid"></b></label><input type="range" id="grid" min="0" max="100" step="5"></div>
   <div class="row"><label>Grid scale <b id="vGScale"></b></label><input type="range" id="gridScale" min="50" max="220" step="5"></div>
   <div class="row"><label>CRT / scanlines <b id="vCrt"></b></label><input type="range" id="crt" min="0" max="100" step="5"></div>
   <div class="row"><label>Glass blur <b id="vBlur"></b></label><input type="range" id="blur" min="0" max="100" step="5"></div>
   <div class="sec">Level / EXP HUD</div>
   <div class="row"><label>HUD on/size <b id="vHud"></b></label><input type="range" id="hud" min="0" max="100" step="5"></div>
   <div class="row"><label>Stats (CPU/GPU) <b id="vStats"></b></label><input type="range" id="stats" min="0" max="100" step="5"></div>
   <div class="row"><label>Stats X <b id="vSx"></b></label><input type="range" id="statsX" min="0" max="100" step="2"></div>
   <div class="row"><label>Stats Y <b id="vSy"></b></label><input type="range" id="statsY" min="0" max="100" step="2"></div>
   <div class="row"><label>Badge X <b id="vBgx"></b></label><input type="range" id="badgeX" min="-100" max="100" step="2"></div>
   <div class="row"><label>Badge Y <b id="vBgy"></b></label><input type="range" id="badgeY" min="-100" max="100" step="2"></div>
   <div class="row"><label>Badge size <b id="vBgs"></b></label><input type="range" id="badgeSize" min="40" max="220" step="10"></div>
   <div class="row"><label>EXP bar X <b id="vEx"></b></label><input type="range" id="expX" min="0" max="100" step="2"></div>
   <div class="row"><label>EXP bar Y <b id="vEy"></b></label><input type="range" id="expY" min="0" max="100" step="2"></div>
   <div class="row"><label>Max FPS <b id="vFps"></b></label><div class="seg" id="fpsSeg"></div></div>
   <div class="divider"></div>
   <div class="btns"><button id="copy">Copy settings</button></div>
   <textarea id="json" readonly></textarea>
   <p class="hint">All settings save into the JSON. Send me the preset to bake.</p>
 </div>
</div>
